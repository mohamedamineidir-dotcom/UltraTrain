name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. SwiftLint ───────────────────────────────────────────────────────────
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging

  # ── 2. Build iOS App ───────────────────────────────────────────────────────
  build-ios:
    name: Build iOS
    runs-on: macos-15
    env:
      SCHEME: UltraTrain
      DESTINATION: "platform=iOS Simulator,name=iPhone 17 Pro"
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Create dummy Secrets.xcconfig
        run: |
          cat > Secrets.xcconfig << 'EOF'
          // CI placeholder — real secrets are in local dev only
          STRAVA_CLIENT_ID =
          STRAVA_CLIENT_SECRET =
          HMAC_SIGNING_SECRET =
          EOF

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: ${{ runner.os }}-spm-ios-${{ hashFiles('**/Package.resolved', 'project.yml') }}
          restore-keys: ${{ runner.os }}-spm-ios-

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project UltraTrain.xcodeproj \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color || true

  # ── 3. iOS Unit Tests ──────────────────────────────────────────────────────
  test-ios:
    name: iOS Unit Tests
    runs-on: macos-15
    needs: build-ios
    env:
      SCHEME: UltraTrain
      DESTINATION: "platform=iOS Simulator,name=iPhone 17 Pro"
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Create dummy Secrets.xcconfig
        run: |
          cat > Secrets.xcconfig << 'EOF'
          // CI placeholder — real secrets are in local dev only
          STRAVA_CLIENT_ID =
          STRAVA_CLIENT_SECRET =
          HMAC_SIGNING_SECRET =
          EOF

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: ${{ runner.os }}-spm-ios-${{ hashFiles('**/Package.resolved', 'project.yml') }}
          restore-keys: ${{ runner.os }}-spm-ios-

      - name: Build for Testing
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project UltraTrain.xcodeproj \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -skipPackagePluginValidation \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO

      - name: Run Unit Tests
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project UltraTrain.xcodeproj \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -only-testing:UltraTrainTests \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Code Coverage Summary
        if: always()
        run: |
          xcrun xccov view --report TestResults.xcresult --json 2>/dev/null \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for t in data.get('targets', []):
              if t.get('name','').startswith('UltraTrain') and not t.get('name','').endswith('Tests'):
                  pct = t.get('lineCoverage', 0) * 100
                  print(f'{t[\"name\"]}: {pct:.1f}%')
          " || echo "Coverage data not available"

      - name: Enforce Coverage Threshold
        run: |
          THRESHOLD=60
          COVERAGE=$(xcrun xccov view --report TestResults.xcresult --json 2>/dev/null \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for t in data.get('targets', []):
              if t.get('name') == 'UltraTrain.app':
                  print(f\"{t.get('lineCoverage', 0) * 100:.1f}\")
                  sys.exit(0)
          print('0')
          ") || echo "0"
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-test-results
          path: TestResults.xcresult
          retention-days: 7

  # ── 4. Build Backend ───────────────────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v4

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.9"

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: Backend/.build
          key: ${{ runner.os }}-spm-backend-${{ hashFiles('Backend/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-backend-

      - name: Build
        run: swift build

  # ── 5. Backend Tests ───────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: build-backend
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v4

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.9"

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: Backend/.build
          key: ${{ runner.os }}-spm-backend-${{ hashFiles('Backend/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-backend-

      - name: Run Tests
        run: swift test
