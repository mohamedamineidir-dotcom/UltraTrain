# .swiftlint.yml — UltraTrain iOS SwiftLint Configuration
# Enforces CLAUDE.md conventions

# ── Paths ─────────────────────────────────────────────────────────────────────

included:
  - UltraTrain
  - UltraTrainWatch
  - UltraTrainWidgets
  - UltraTrainWatchWidgets
  - Tests

excluded:
  - Backend
  - build
  - UltraTrain.xcodeproj
  - Scripts

# ── Opt-in rules ──────────────────────────────────────────────────────────────

opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - convenience_type
  - empty_collection_literal
  - empty_string
  - explicit_init
  - fatal_error_message
  - final_class
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - identical_operands
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - local_doc_comment
  - lower_acl_than_parent
  - modifier_order
  - optional_enum_case_matching
  - overridden_super_call
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - raw_value_for_camel_cased_codable_enum
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - return_value_from_void_function
  - self_binding
  - shorthand_optional_binding
  - sorted_first_last
  - static_operator
  - toggle_bool
  - unavailable_function
  - unowned_variable_capture
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

disabled_rules:
  - todo
  - cyclomatic_complexity
  - function_parameter_count
  - trailing_comma
  - type_body_length
  - opening_brace
  - large_tuple
  - force_try

# ── Rule configuration ────────────────────────────────────────────────────────

file_length:
  warning: 300
  error: 1000
  ignore_comment_only_lines: true

function_body_length:
  warning: 60
  error: 200

line_length:
  warning: 130
  error: 300
  ignores_urls: true
  ignores_comments: true
  ignores_interpolated_strings: true

type_name:
  min_length: 3
  max_length: 50
  excluded:
    - ID

identifier_name:
  min_length: 2
  max_length: 50
  excluded:
    - id
    - vm
    - hr
    - tz
    - x
    - y
    - i
    - to
    - km

nesting:
  type_level:
    warning: 3
  function_level:
    warning: 5

trailing_whitespace:
  ignores_empty_lines: true

force_unwrapping:
  severity: warning

number_separator:
  minimum_length: 7

# ── Custom rules ──────────────────────────────────────────────────────────────

custom_rules:
  no_userdefaults_sensitive:
    name: "No UserDefaults for Sensitive Data"
    regex: 'UserDefaults\.\w+\.\w+\(.*"(token|password|secret|credential|accessToken|refreshToken|jwt|apiKey)"'
    message: "Do not store tokens or credentials in UserDefaults. Use Keychain instead (CLAUDE.md §3)."
    severity: error

  no_combine:
    name: "No Combine"
    regex: 'import Combine|@Published |ObservableObject|PassthroughSubject|CurrentValueSubject'
    message: "Use async/await and @Observable instead of Combine (CLAUDE.md §5)."
    severity: error

  no_print:
    name: "Use os.Logger not print"
    regex: '\bprint\s*\('
    message: "Use os.Logger with appropriate log level instead of print() (CLAUDE.md §5)."
    severity: warning
