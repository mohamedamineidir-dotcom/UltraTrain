# .swiftlint.yml — UltraTrain iOS SwiftLint Configuration
# Enforces CLAUDE.md conventions (Clean Architecture + MVVM, Swift 6, SwiftUI, iOS 17+)

# ── Paths ─────────────────────────────────────────────────────────────────────

included:
  - UltraTrain
  - UltraTrainWatch
  - UltraTrainWidgets
  - UltraTrainWatchWidgets
  - UltraTrainClip
  - Tests

excluded:
  - Backend
  - build
  - .build
  - website
  - DerivedData
  - Pods
  - "**/*.generated.swift"
  - UltraTrain.xcodeproj
  - Scripts
  - Configuration

# ── Opt-in rules ──────────────────────────────────────────────────────────────

opt_in_rules:
  # -- Collections & algorithms --
  - array_init
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - empty_collection_literal
  - empty_string
  - first_where
  - flatmap_over_map_reduce
  - joined_default_parameter
  - last_where
  - reduce_into
  - sorted_first_last

  # -- Style & formatting --
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - literal_expression_end_indentation
  - modifier_order
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces

  # -- Code quality --
  - convenience_type
  - explicit_init
  - fatal_error_message
  - final_class                        # All classes final (CLAUDE.md S5)
  - force_unwrapping                   # No force unwraps (CLAUDE.md S5)
  - identical_operands
  - legacy_multiple
  - local_doc_comment
  - lower_acl_than_parent
  - optional_enum_case_matching
  - overridden_super_call
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - raw_value_for_camel_cased_codable_enum
  - redundant_nil_coalescing
  - redundant_type_annotation
  - return_value_from_void_function
  - self_binding
  - shorthand_optional_binding
  - static_operator
  - toggle_bool
  - unavailable_function
  - unowned_variable_capture
  - untyped_error_in_catch
  - yoda_condition

disabled_rules:
  # Noisy / conflicts with project style
  - todo                               # TODOs are OK during development
  - trailing_comma                     # Trailing commas are fine in Swift
  - opening_brace                      # Conflicts with some multi-line patterns
  - large_tuple                        # Domain models sometimes need tuples

  # Swift 6 strict concurrency conflicts
  - force_try                          # Sometimes needed in concurrency init patterns
  - cyclomatic_complexity              # Async flows inflate this artificially
  - function_parameter_count           # Swift 6 actor inits can have many params
  - nesting                            # Swift 6 concurrency types sometimes nest

# ── Rule configuration ────────────────────────────────────────────────────────

# CLAUDE.md: "No file should exceed 300 lines"
file_length:
  warning: 300
  error: 400
  ignore_comment_only_lines: true

# CLAUDE.md: Keep functions focused and short
function_body_length:
  warning: 60
  error: 100

# CLAUDE.md: "No manager/helper/utility class over 200 lines"
type_body_length:
  warning: 250
  error: 400

# Practical line length for SwiftUI code with modifiers
line_length:
  warning: 150
  error: 200
  ignores_urls: true
  ignores_comments: true
  ignores_interpolated_strings: true

type_name:
  min_length: 3
  max_length: 50
  excluded:
    - ID

identifier_name:
  min_length: 2
  max_length: 50
  excluded:
    - id
    - vm
    - hr
    - tz
    - x
    - y
    - i
    - to
    - km
    - d
    - db
    - ok
    - os

trailing_whitespace:
  ignores_empty_lines: true

trailing_newline: true

force_unwrapping:
  severity: warning

number_separator:
  minimum_length: 7

# ── Custom rules ──────────────────────────────────────────────────────────────

custom_rules:
  no_userdefaults_sensitive:
    name: "No UserDefaults for Sensitive Data"
    regex: 'UserDefaults\.\w+\.\w+\(.*"(token|password|secret|credential|accessToken|refreshToken|jwt|apiKey)"'
    message: "Do not store tokens or credentials in UserDefaults. Use Keychain instead (CLAUDE.md S3)."
    severity: error

  no_combine:
    name: "No Combine"
    regex: 'import Combine|@Published |ObservableObject|PassthroughSubject|CurrentValueSubject'
    message: "Use async/await and @Observable instead of Combine (CLAUDE.md S5)."
    severity: warning

  no_print:
    name: "Use os.Logger not print"
    regex: '\bprint\s*\('
    message: "Use os.Logger with appropriate log level instead of print() (CLAUDE.md S5)."
    severity: warning

  no_any_type:
    name: "No Any or AnyObject in interfaces"
    regex: ':\s*(Any|AnyObject)\b|\[String:\s*Any\]|\[AnyHashable:'
    message: "Avoid Any, AnyObject, or untyped dictionaries. Use strongly-typed models (CLAUDE.md S5)."
    severity: warning

  no_storyboard:
    name: "No Storyboards or XIBs"
    regex: 'UIStoryboard|\.storyboardName|\.instantiateViewController|UINib\('
    message: "SwiftUI only. Do not use storyboards or XIBs (CLAUDE.md Quick Reference)."
    severity: error

  prefer_struct:
    name: "Prefer struct over class"
    regex: '^\s*class\s+\w+\s*[:{]'
    message: "Prefer struct over class unless reference semantics are required (CLAUDE.md S5). If intentional, add a comment."
    severity: warning
    excluded: ".*Tests.*|.*Model.*|.*Actor.*"
