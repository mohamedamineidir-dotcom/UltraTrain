name: UltraTrain
options:
  bundleIdPrefix: com.ultratrain
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.2"
  generateEmptyDirectories: true
  groupSortPosition: top

configFiles:
  Debug: Configuration/Debug.xcconfig
  Release: Configuration/Release.xcconfig

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    KNOWN_REGIONS: "en fr"
    DEVELOPMENT_TEAM: KF2LJCF3GM

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"

targets:
  UltraTrain:
    type: application
    platform: iOS
    sources:
      - path: UltraTrain
        excludes:
          - "**/.DS_Store"
    resources:
      - path: UltraTrain/Resources
    dependencies:
      - target: UltraTrainWatch
        embed: true
      - target: UltraTrainWidgets
        embed: true
      - target: UltraTrainClip
        embed: true
      - sdk: WatchConnectivity.framework
      - package: GoogleSignIn
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ultratrain.app
        INFOPLIST_FILE: UltraTrain/Resources/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
        PRODUCT_NAME: UltraTrain
        SWIFT_EMIT_LOC_STRINGS: "YES"
    entitlements:
      path: UltraTrain/Resources/UltraTrain.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.security.application-groups:
          - group.com.ultratrain.shared
        com.apple.developer.icloud-services:
          - CloudDocuments
          - CloudKit
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.ultratrain.app
        aps-environment: production
        com.apple.developer.default-data-protection: NSFileProtectionComplete
        com.apple.developer.associated-domains:
          - applinks:ultratrain.app
    postCompileScripts: []

  UltraTrainWatch:
    type: application
    platform: watchOS
    sources:
      - path: UltraTrainWatch
        excludes:
          - "**/.DS_Store"
      - path: UltraTrain/Shared
        excludes:
          - "**/.DS_Store"
    resources:
      - path: UltraTrainWatch/Resources
    dependencies:
      - sdk: WatchConnectivity.framework
      - target: UltraTrainWatchWidgets
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ultratrain.app.watchkitapp
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.ultratrain.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: "YES"
    entitlements:
      path: UltraTrainWatch/Resources/UltraTrainWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ultratrain.shared
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []

  UltraTrainWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: UltraTrainWidgets
        excludes:
          - "**/.DS_Store"
      - path: UltraTrain/Shared
        excludes:
          - "**/.DS_Store"
    resources:
      - path: UltraTrainWidgets/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ultratrain.app.widgets
        INFOPLIST_FILE: UltraTrainWidgets/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        SWIFT_EMIT_LOC_STRINGS: "YES"
    entitlements:
      path: UltraTrainWidgets/Resources/UltraTrainWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ultratrain.shared

  UltraTrainWatchWidgets:
    type: app-extension
    platform: watchOS
    sources:
      - path: UltraTrainWatchWidgets
        excludes:
          - "**/.DS_Store"
      - path: UltraTrain/Shared
        excludes:
          - "**/.DS_Store"
    resources:
      - path: UltraTrainWatchWidgets/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ultratrain.app.watchkitapp.widgets
        INFOPLIST_FILE: UltraTrainWatchWidgets/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        SWIFT_EMIT_LOC_STRINGS: "YES"
    entitlements:
      path: UltraTrainWatchWidgets/Resources/UltraTrainWatchWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ultratrain.shared

  UltraTrainClip:
    type: application.on-demand-install-capable
    platform: iOS
    sources:
      - path: UltraTrainClip
        excludes:
          - "**/.DS_Store"
          - Resources
    resources:
      - path: UltraTrainClip/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ultratrain.app.Clip
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: UltraTrain Clip
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: "YES"
    entitlements:
      path: UltraTrainClip/Resources/UltraTrainClip.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ultratrain.shared
        com.apple.developer.associated-domains:
          - applinks:ultratrain.app
        com.apple.developer.parent-application-identifiers:
          - $(AppIdentifierPrefix)com.ultratrain.app

  UltraTrainTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/UnitTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: UltraTrain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ultratrain.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/UltraTrain.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/UltraTrain"
        BUNDLE_LOADER: "$(TEST_HOST)"

  UltraTrainUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/UITests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: UltraTrain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ultratrain.uitests
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: UltraTrain

schemes:
  UltraTrain:
    build:
      targets:
        UltraTrain: all
        UltraTrainWatch: all
        UltraTrainWidgets: all
        UltraTrainWatchWidgets: all
        UltraTrainClip: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - name: UltraTrainTests
          randomExecutionOrder: true
        - name: UltraTrainUITests
          randomExecutionOrder: true
      coverageTargets:
        - UltraTrain
    archive:
      config: Release

  UltraTrainClip:
    build:
      targets:
        UltraTrainClip: all
    run:
      config: Debug
      environmentVariables:
        - variable: _XCAppClipURL
          value: "https://ultratrain.app/race/test-race-id/nutrition"
          isEnabled: true
